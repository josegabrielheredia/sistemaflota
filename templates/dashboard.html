{% extends 'base.html' %}

{% block content %}
<section class="content-card">
    <div class="section-heading">
        <div>
            <span class="section-kicker">Modulos</span>
            <h2>Vista general del sistema</h2>
        </div>
    </div>
    <div class="module-list">
        {% for module in module_cards %}
        <a class="module-list-row" href="{{ module.href }}">
            <div class="module-list-copy">
                <h3>{{ module.title }}</h3>
                <p>{{ module.text }}</p>
            </div>
            <div class="module-list-meta">
                <span class="module-list-metric">{{ module.metric }}</span>
                <span class="module-list-link">Abrir modulo</span>
            </div>
        </a>
        {% endfor %}
    </div>
</section>
{% endblock %}
